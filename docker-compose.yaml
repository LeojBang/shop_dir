services:

  db:
    image: postgres:17

    env_file:
      - .env

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .

    env_file:
      - .env

    depends_on:
      db:
        condition: service_healthy

    restart: unless-stopped

volumes:
  postgres_data: