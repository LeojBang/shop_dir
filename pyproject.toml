[tool.black]
line-length = 88
target-version = ["py312"]
# Исключаем миграции — там автогенерированный код
exclude = '''
/(
    migrations
  | \.venv
  | \.git
  | __pycache__
)/
'''

[tool.isort]
profile = "black"
line_length = 88

[tool.mypy]
python_version = "3.12"
strict = false

# Базовые проверки
check_untyped_defs = true
disallow_untyped_defs = false   # включим постепенно
warn_return_any = true
warn_unused_ignores = true
warn_redundant_casts = true
no_implicit_optional = true

# Игнорируем библиотеки без стабов
ignore_missing_imports = true

# Исключаем миграции и тесты из строгих проверок
exclude = [
    "migrations/",
    "tests/",
]

# Отдельные настройки для менее строгих модулей
[[tool.mypy.overrides]]
module = "bot.handlers.*"
disallow_untyped_defs = false

[[tool.mypy.overrides]]
module = "repositories.*"
disallow_untyped_defs = false

[tool.pytest.ini_options]
asyncio_mode = "auto"