name: CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:

  # ── Тесты и линтеры ─────────────────────────────────────────────────────────
  test:
    name: Тесты и линтеры
    runs-on: ubuntu-latest

    env:
      BOT_TOKEN: "test_token"
      DB_HOST: "localhost"
      DB_PORT: "5432"
      DB_NAME: "test_db"
      DB_USER: "postgres"
      DB_PASSWORD: "postgres"
      PAYMENT_BANK_NAME: "TEST BANK"
      PAYMENT_RECIPIENT: "Test User"
      PAYMENT_CARD_NUMBER: "1234567890123456"
      ADMIN_IDS: "[123456789]"

    steps:
      - name: Checkout кода
        uses: actions/checkout@v4

      - name: Установка Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Установка зависимостей
        run: |
          pip install -r requirements.txt
          pip install black flake8

      - name: Black — проверка форматирования
        run: black --check .

      - name: Flake8 — линтер
        run: flake8 .

      - name: Pytest — тесты
        run: pytest -m tests/ -v

  # ── Деплой на сервер ─────────────────────────────────────────────────────────
  deploy:
    name: Деплой на сервер
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Деплой через SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd ~/shop_dir
            echo "==> Забираем изменения из git..."
            git pull origin master
            echo "==> Пересобираем и перезапускаем бота..."
            docker compose up -d --build bot
            echo "==> Применяем миграции..."
            docker compose exec -T bot alembic upgrade head
            echo "==> Проверяем статус..."
            docker compose ps
            echo "✅ Деплой завершён"
