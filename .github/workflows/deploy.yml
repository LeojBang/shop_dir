name: CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:

  # ── Тесты и линтеры ─────────────────────────────────────────────────────────
  test:
    name: Тесты и линтеры
    runs-on: ubuntu-latest

    steps:
      - name: Checkout кода
        uses: actions/checkout@v4

      - name: Установка Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Установка зависимостей
        run: |
          pip install -r requirements.txt
          pip install black flake8

      - name: Black — проверка форматирования
        run: black --check .

      - name: Flake8 — линтер
        run: flake8 .

      - name: Pytest — тесты
        run: python -m pytest tests/ -v

  # ── Деплой на сервер ─────────────────────────────────────────────────────────
  deploy:
    name: Деплой на сервер
    runs-on: ubuntu-latest
    needs: test  # деплоим только если тесты прошли
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Деплой через SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e

            cd ~/shop_dir

            echo "==> Забираем изменения из git..."
            git pull origin master

            echo "==> Пересобираем и перезапускаем бота..."
            docker compose up -d --build bot

            echo "==> Применяем миграции..."
            docker compose exec -T bot alembic upgrade head

            echo "==> Проверяем статус..."
            docker compose ps

            echo "✅ Деплой завершён"