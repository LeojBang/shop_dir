[mypy]
python_version = 3.12
ignore_missing_imports = True
check_untyped_defs = True
warn_return_any = False
warn_unused_ignores = False
exclude = \.venv|migrations|tests
explicit_package_bases = True

# Pydantic плагин — убирает ошибки с Settings()
plugins = pydantic.mypy

# Хендлеры и фильтры — слишком много ложных срабатываний
# из-за специфики aiogram типов
[mypy-bot.handlers.*]
ignore_errors = True

[mypy-bot.filters.*]
ignore_errors = True

# Конфиг — pydantic-settings не дружит с mypy без плагина
[mypy-core.config]
ignore_errors = True

# Репозитории и сервисы — проверяем, они чистые
[mypy-repositories.*]
ignore_errors = False

[mypy-services.*]
ignore_errors = False

[mypy-models.*]
ignore_errors = False